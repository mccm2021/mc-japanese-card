<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语闪卡 - 极简背诵</title>
    <style>
        :root { --bg: #fdfcf8; --card: #ffffff; --text: #333; --sub: #888; }
        body { background: var(--bg); font-family: "Helvetica Neue", "Helvetica", "Arial", "PingFang SC", "Hiragino Sans GB", "Heiti SC", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: var(--text); }
        .card-container { perspective: 1000px; width: 300px; height: 200px; cursor: pointer; margin-bottom: 40px; }
        .card { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-radius: 12px; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 12px; border: 1px solid #eee; padding: 20px; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); background: #fafafa; }
        .kanji { font-size: 42px; font-weight: 500; margin-bottom: 10px; }
        .kana { font-size: 20px; color: var(--sub); }
        .meaning { font-size: 24px; color: #444; margin-bottom: 8px; }
        .example { font-size: 14px; color: var(--sub); line-height: 1.4; }
        .btns { display: flex; gap: 20px; }
        button { background: none; border: 1px solid #ddd; padding: 8px 24px; border-radius: 20px; cursor: pointer; color: var(--sub); transition: all 0.3s; }
        button:hover { border-color: #999; color: var(--text); background: #f5f5f5; }
        .count { margin-top: 20px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="kanji" id="display-kanji">読み込み中...</div>
            </div>
            <div class="card-face card-back">
                <div class="meaning" id="display-meaning">释义</div>
                <div class="kana" id="display-kana">假名</div>
                <div class="example" id="display-example">例句加载中...</div>
            </div>
        </div>
    </div>

    <div class="btns">
        <button onclick="prevCard(event)">上一个</button>
        <button onclick="nextCard(event)">下一个</button>
    </div>

    <div class="count" id="display-count">0 / 0</div>

    <script>
        // 【这里就是 Skill 产生的数据内容】
        const wordList = [
            { kanji: "私", kana: "わたし", meaning: "我", example: "私は学生です。" },
            { kanji: "食べる", kana: "たべる", meaning: "吃", example: "リンゴを食べます。" },
            { kanji: "日本語", kana: "にほんご", meaning: "日语", example: "日本語を勉強しています。" },
            { kanji: "美しい", kana: "うつくしい", meaning: "美丽", example: "富士山は美しいです。" },
            { kanji: "買い物", kana: "かいもの", meaning: "购物", example: "デパートで買い物をします。" },
            { kanji: "友達", kana: "ともだち", meaning: "朋友", example: "友達と遊びに行きます。" },
            { kanji: "先生", kana: "せんせい", meaning: "老师", example: "先生、質問があります。" },
            { kanji: "歩く", kana: "あるく", meaning: "步行", example: "公園を歩きます。" },
            { kanji: "明日", kana: "あした", meaning: "明天", example: "明日は雨が降るでしょう。" },
            { kanji: "お茶", kana: "おちゃ", meaning: "茶", example: "お茶を飲みませんか？" }
        ];

        // 随机打乱单词顺序 (Fisher-Yates Shuffle)
        wordList.sort(() => Math.random() - 0.5);

        let currentIndex = 0;

        function updateCard() {
            const word = wordList[currentIndex];
            document.getElementById('display-kanji').innerText = word.kanji;
            document.getElementById('display-kana').innerText = word.kana;
            document.getElementById('display-meaning').innerText = word.meaning;
            document.getElementById('display-example').innerText = word.example;
            document.getElementById('display-count').innerText = `${currentIndex + 1} / ${wordList.length}`;
            document.getElementById('card').classList.remove('flipped');
            
            // 自动朗读正面单词
            speak(word.kanji);
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard(e) {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % wordList.length;
            updateCard();
        }

        function prevCard(e) {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + wordList.length) % wordList.length;
            updateCard();
        }

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        // 初始化
        updateCard();
    </script>
</body>
</html>
